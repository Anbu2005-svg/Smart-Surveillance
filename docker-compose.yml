version: '3.8'

services:
  backend:
    build: .
    ports:
      - "127.0.0.1:5000:5000"
    environment:
      - API_HOST=0.0.0.0
      - API_PORT=5000
      - AUTH_REQUIRED=true
      - ENABLE_API_DOCS=false
      - CORS_ORIGINS=http://localhost:3000,http://127.0.0.1:3000
      - SUPABASE_URL=${SUPABASE_URL:-}
      - SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY:-}
      - SUPABASE_AUTH_KEY=${SUPABASE_AUTH_KEY:-}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY:-}
      - DEVICE=cpu
      - CONFIDENCE_THRESHOLD=0.5
      - ALLOWED_CAMERA_URL_SCHEMES=http,https,rtsp,rtmp
      - BLOCKED_CAMERA_HOSTS=localhost,127.0.0.1,::1,0.0.0.0,169.254.169.254,metadata.google.internal
    volumes:
      - ./temp_frames:/app/temp_frames
      - ./output_frames:/app/output_frames
    networks:
      - cctv-network

  frontend:
    build: ./surveillance-frontend
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      - VITE_API_URL=http://backend:5000/api
    depends_on:
      - backend
    networks:
      - cctv-network

networks:
  cctv-network:
    driver: bridge
